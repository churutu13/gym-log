<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111315" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gym Log" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Gym Log</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Allenamento</p>
          <h1>Gym Log</h1>
        </div>
      </header>

      <section class="session-summary" aria-label="Riepilogo allenamento">
        <div>
          <span id="summaryExercises">0</span>
          <small>esercizi</small>
        </div>
        <div>
          <span id="summarySets">0</span>
          <small>serie</small>
        </div>
        <div>
          <span id="summaryDuration">00:00</span>
          <small>durata</small>
        </div>
      </section>

      <form class="entry-panel" id="exerciseForm">
        <label class="field field-wide">
          <span>Esercizio</span>
          <input id="exerciseName" type="text" inputmode="text" autocomplete="off" placeholder="Panca piana" required />
        </label>
        <div id="exerciseSuggestions" class="suggestions" hidden></div>

        <div class="set-builder">
          <div class="set-heading">
            <span>Serie</span>
            <button id="addSet" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
              Serie
            </button>
          </div>
          <div id="setRows" class="set-rows"></div>
        </div>

        <div class="rest-panel">
          <span>Pausa</span>
          <div class="quick-row" aria-label="Scelte rapide pausa">
            <button type="button" data-rest="60">60s</button>
            <button type="button" data-rest="90" class="active">90s</button>
            <button type="button" data-rest="120">120s</button>
            <button type="button" data-rest="180">180s</button>
          </div>
        </div>

        <button class="primary-action" type="submit">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Aggiungi esercizio
        </button>
      </form>

      <section class="workout-list" aria-label="Esercizi registrati">
        <div class="section-heading">
          <h2>Sessione</h2>
          <button id="finishWorkout" type="button">Salva</button>
        </div>
        <div id="emptyState" class="empty-state">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 8h10M7 12h10M7 16h6M5 4h14v18l-3-2-3 2-3-2-3 2V4Z" />
          </svg>
          <p>Inserisci il primo esercizio per iniziare la sessione.</p>
        </div>
        <ul id="exerciseList"></ul>
      </section>

      <section class="progress-panel" aria-label="Progressive overload">
        <details>
          <summary>
            <div>
              <h2>Progressi</h2>
              <span id="progressSummary">Ultima vs precedente</span>
            </div>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
          </summary>
          <div id="progressEmpty" class="empty-state">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m4 16 5-5 4 4 7-8M15 7h5v5" />
            </svg>
            <p>Salva almeno due sessioni con lo stesso esercizio per vedere il progresso.</p>
          </div>
          <ul id="progressList"></ul>
        </details>
      </section>

      <section class="history-panel" aria-label="Storico allenamenti">
        <div class="section-heading">
          <h2>Storico</h2>
          <button id="clearHistory" type="button">Reset</button>
        </div>
        <ul id="historyList"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
